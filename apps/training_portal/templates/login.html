<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>EECampEdu Login</title>
<style>
  :root { --bg:#0f172a; --panel:#1e293b; --panel2:#273449; --text:#e2e8f0; --muted:#94a3b8; --accent:#38bdf8; --bad:#ef4444; --border:#334155; }
  * { box-sizing:border-box; }
  body { margin:0; min-height:100vh; display:grid; place-items:center; background:var(--bg); color:var(--text); font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif; }
  .card { width:min(420px, calc(100vw - 32px)); background:var(--panel); border:1px solid var(--border); border-radius:12px; padding:24px; }
  h1 { margin:0 0 6px; font-size:22px; }
  p { color:var(--muted); margin:0 0 18px; font-size:13px; }
  label { display:block; color:var(--muted); font-size:12px; margin:12px 0 5px; }
  select,input { width:100%; padding:10px; border-radius:8px; border:1px solid var(--border); background:var(--panel2); color:var(--text); font:inherit; }
  button { width:100%; margin-top:18px; padding:11px; border-radius:8px; border:0; background:var(--accent); color:#06283d; font-weight:700; cursor:pointer; }
  .err { color:var(--bad); font-size:13px; margin-top:10px; }
  code { background:var(--panel2); padding:1px 5px; border-radius:4px; }
</style>
</head>
<body>
  <form class="card" method="post" action="/login">
    <h1>EECampEdu Portal</h1>
    <p>Choose your team account. Ask the instructor for the password.</p>
    <input type="hidden" name="next" value="{{ next }}" />
    <label>Team</label>
    <select name="team">
      {% for team in teams %}<option value="{{ team }}">{{ team }}</option>{% endfor %}
    </select>
    <label>Password</label>
    <input name="password" type="password" autocomplete="current-password" autofocus />
    <button type="submit">Login</button>
    {% if error %}<div class="err">{{ error }}</div>{% endif %}
    <p style="margin-top:14px">Default classroom pattern is configurable by <code>EECAMP_TEAM_PASSWORDS</code>.</p>
  </form>
</body>
</html>
